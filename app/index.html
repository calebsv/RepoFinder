<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RepoFinder | Seu buscador de repositórios</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <meta name="description" content="Aplicação feita com API pronta para buscar e achar repositórios específicos">
    <meta name="author" content="Caleb Lira">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        limao: "#5DD62C ",
                        esmeralda: "#2EDC85",
                        mala: "#224F10",
                        dark: "#0F0F0F",
                        cinza: "#202020",
                    },
                },
            },
        };
    </script>
</head>

<body class="relative min-h-dvh overflow-x-hidden bg-dark text-white">

    <div class="flex items-center justify-center fade-in delay-1">
    <div class="mt-2 inline-flex gap-2 rounded-full border border-lime-500/20 bg-lime-500/10 px-4 py-2 text-sm text-lime-500 text-center">GitHub Repository Search <i class="bi bi-github"></i></div>
    </div>
    <h1 class="font-black tracking-tight leading-none text-5xl md:text-7xl sm:text-6xl text-center mt-10 fade-in delay-2">
        Repo<span class="text-limao">Finder</span></h1>
    <p class="mt-5 max-w-md mx-auto text-zinc-400 leading-relaxed text-center fade-in delay-3">
        Explore perfis, descubra projetos e encontre repositórios em segundos.
    </p>

    <div class="absolute -top-44 -left-44 w-[500px] h-[500px] rounded-full bg-[#5DD62C]/20 blur-[180px]"></div>

    <section class="relative flex mt-8 items-center justify-center px-5">
        <form
            class="relative mx-auto w-full max-w-lg space-y-8 rounded-3xl border border-white/10 bg-white/[0.03] p-6 shadow-2xl backdrop-blur-3xl sm:p-8 md:p-10 fade-in delay-4" id="search-form">

            <div
                class="absolute left-0 top-0 h-px w-full bg-gradient-to-r from-transparent via-lime-400/60 to-transparent">
            </div>

            <div>
                <p class="mt-2 text-zinc-400">
                    Encontre qualquer repositório do GitHub digitando o nome do usuário. Exemplo: <span class="text-lime-400">calebsv</span>
                </p>
            </div>

            <div class="relative mb-12">
                <i class="bi bi-search absolute left-5 top-1/2 -translate-y-1/2 text-xl text-lime-400">
                </i>

                <input type="text" placeholder="Digite um usuário..."
                    class="w-full rounded-2xl border border-white/10 bg-black/20 py-4 pl-14 pr-5 text-white outline-none transition placeholder:text-zinc-500 focus:border-lime-400 focus:ring-4 focus:ring-lime-400/20" id="search-input" type="text" 
                    />
            </div>

            <button type="submit"
                class="mx-auto flex w-fit px-8 rounded-2xl bg-gradient-to-r from-lime-500 to-emerald-500 py-4 font-semibold text-white transition-all duration-300 hover:scale-[1.02] hover:shadow-[0_0_35px_rgba(93,214,44,.45)] active:scale-95 font-bold">
                Buscar 
            </button>

        </form>

    </section>

    <section id="profile" class="mt-10 mx-auto max-w-5xl px-5"></section>
    <section id="results" class="mt-10 mx-auto max-w-7xl px-5 grid-cols-1 gap-6 md:grid-cols-2 xl:grid-cols-3"></section>

    <footer class="relative mt-12 sm:mt-32 pb-10 fade-in delay-5">

            <div class="absolute left-1/2 top-0 h-40 w-40 -translate-x-1/2 rounded-full bg-lime-500 opacity-20 blur-[120px]"></div>

            <div
                class="relative mx-auto max-w-xl rounded-3xl border border-white/10 bg-white/5 backdrop-blur-xl text-center px-2 py-1.5 sm:px-6 sm:py-3">
                <span class="text-text text-md sm:text-base">Desenvolvido por <a href="https://github.com/calebsv" target="_blank" style="text-decoration: none; color:lime;">Caleb Lira</a> &copy;</span>
            </div>

        </footer>

    
<script type="module" src="js/main.js"></script>
</body>

</html>
