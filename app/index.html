<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RepoFinder | Seu buscador de repositórios</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <meta name="description" content="Aplicação feita com API pronta para buscar e achar repositórios específicos">
    <meta name="author" content="Caleb Lira">
    <link rel="shortcut icon" href="assets/favicon.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        limao: "#5DD62C ",
                        esmeralda: "#2EDC85",
                        mala: "#224F10",
                        dark: "#0F0F0F",
                        cinza: "#202020",
                        bang: '#051650',
                        gr: "#123499",
                    },
                },
            },
        };
    </script>
</head>

<body
    class="relative min-h-dvh overflow-x-hidden bg-white/10 text-zinc-900 dark:bg-dark dark:text-white transition-colors duration-300">

    <div class="flex items-center justify-center fade-in delay-1">
        <div
            class="mt-2 inline-flex gap-2 rounded-full border border-gr bg-blue-600/10 dark:bg-lime-500/10 px-4 py-2 text-sm text-bang dark:text-lime-500 dark:border-lime-500 text-center">
            GitHub Repository Search <i class="bi bi-github"></i>
        </div>
    </div>
    <h1
        class="font-bold text-white tracking-tight leading-none text-5xl md:text-7xl sm:text-6xl text-center mt-10 fade-in delay-2 text-shadow">
        Repo<span class="text-gr dark:text-limao">Finder</span>
    </h1>
    <button id="theme-toggle"
        class="absolute top-5 right-5 z-50 rounded-full border border-gr text-gr dark:border-white/10 dark:bg-white/5 p-3 dark:text-lime-400 hover:bg-white/10 transition"
        aria-label="Trocar tema">
        <i id="theme-icon" class="bi bi-moon-stars text-xl"></i>
    </button>
    <p class="mt-5 max-w-md mx-auto text-zinc-600 dark:text-zinc-400 leading-relaxed text-center fade-in delay-3">
        Explore perfis, descubra projetos e encontre repositórios em segundos.
    </p>

    <div class="absolute -top-44 -left-44 w-[500px] h-[500px] rounded-full bg-[#5DD62C]/20 blur-[180px]"></div>

    <section class="relative flex mt-8 items-center justify-center px-5">
        <form
            class="relative mx-auto w-full max-w-lg space-y-8 rounded-3xl border border-gr dark:border-limao dark:border-white/10 dark:bg-white/[0.03] p-6 shadow-2xl backdrop-blur-3xl sm:p-8 md:p-10 fade-in delay-4 shadow-lg"
            id="search-form">

            <div
                class="absolute left-0 top-0 h-px w-full bg-gradient-to-r from-transparent via-lime-400/60 to-transparent">
            </div>

            <div>
                <p class="mt-2 text-zinc-600 dark:text-zinc-400">
                    Encontre qualquer repositório do GitHub digitando o nome do usuário. Exemplo: <a href="https://github.com/calebsv" target="_blank" class="text-gr dark:text-lime-400">calebsv</a>
                </p>
            </div>

            <div class="relative mb-12">
                <i class="bi bi-search absolute left-5 top-1/2 -translate-y-1/2 text-xl dark:text-lime-400 text-gr">
                </i>

                <input type="text" placeholder="Digite um usuário..."
                    class="w-full rounded-2xl border dark:border-white/10 border-black/10 bg-black/20 py-4 pl-14 pr-5 text-gr dark:text-white outline-none transition placeholder:text-zinc-500 focus:border-gr focus:ring-gr/20 dark:focus:border-lime-400 focus:ring-4 dark:focus:ring-lime-400/20"
                    id="search-input" type="text" />
            </div>

            <button type="submit"
                class="mx-auto flex w-fit px-5 py-2.5 rounded-[7px] bg-gr text-white text-[17px] font-bold transition-all duration-500 shadow-[0_0_25px_theme(colors.gr)]   hover:shadow-[0_0_5px_theme(colors.bang),0_0_25px_theme(colors.gr)] dark:bg-limao dark:shadow-[0_0_25px_theme(colors.limao)]  dark:hover:shadow-[0_0_5px_theme(colors.esmeralda),0_0_25px_theme(colors.limao)] hover:-translate-y-2">
                Buscar
            </button>

        </form>

    </section>

    <div id="repository-count" class="mt-10 font-bold text-center text-gr dark:text-zinc-400"></div>
    <section id="profile" class="mt-10 mx-auto max-w-5xl px-5"></section>
    <div class="flex flex-col gap-4 md:flex-row">
        <select id="sort-select"
            class="hidden mt-8 mx-auto rounded-lg border border-gr dark:border-limao bg-black/10  px-4 py-3 dark:text-limao text-gr">
            <option value="stars">⭐ Mais estrelas</option>
            <option value="forks">🍴 Mais forks</option>
            <option value="recent">🕒 Mais recente</option>
            <option value="oldest">📅 Mais antigo</option>
            <option value="az">🔤 Nome (A-Z)</option>
            <option value="za">🔠 Nome (Z-A)</option>
        </select>

    </div>
    <section id="results" class="mt-10 mx-auto max-w-7xl px-5 grid grid-cols-1 gap-6 md:grid-cols-2 xl:grid-cols-3">
    </section>

    <footer class="relative mt-12 sm:mt-32 pb-10 fade-in delay-5">

        <div
            class="absolute left-1/2 top-0 h-40 w-40 -translate-x-1/2 rounded-full bg-lime-500 opacity-20 blur-[120px]">
        </div>

        <div
            class="relative mx-auto max-w-xl rounded-3xl border border-gr bg-black/10 dark:border-white/10 dark:bg-white/5 backdrop-blur-xl text-center px-2 py-1.5 sm:px-6 sm:py-3 font-bold">
            <span class="text-zinc-600 dark:text-white text-md sm:text-base">Desenvolvido por <a href="https://github.com/calebsv"
                    target="_blank" class="text-gr dark:text-limao">Caleb Lira</a> &copy;</span>
        </div>

    </footer>


    <script type="module" src="js/main.js"></script>
    <script type="module" src="js/theme.js"></script>
</body>

</html>
